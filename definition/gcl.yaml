---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: MCP Tool Drift Detection (Exchange)
    description: |
      Detects tool drift by comparing runtime MCP tools/list responses
      against canonical descriptors published to Anypoint Exchange.
      Enforcement modes: strip, warn, or observe. Last-known-good
      cache survives Exchange outages.
    category: MCP
    metadata/interfaceScope: api,resource
    metadata/capabilities/injectionPoint: inbound
    metadata/capabilities/assetTypes: mcp
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    # ------------------------------------------------------------------
    # Exchange asset that holds the canonical descriptor set.
    # ------------------------------------------------------------------
    exchange:
      type: object
      description: |
        Anypoint Exchange asset reference. The descriptor set is fetched
        in two hops: (1) GET the asset metadata at
        `exchange/api/v2/assets/{group}/{asset}/{version}`, then (2) GET
        the JSON descriptor file from the pre-signed `externalLink`
        returned in that metadata's `files` array.
      properties:
        orgId:
          type: string
        groupId:
          type: string
        assetId:
          type: string
        version:
          type: string
          description: |
            Asset version. Use a pinned semver for deterministic
            enforcement; `latest` is accepted but emits a
            `version_changed` event whenever the underlying version
            changes between refreshes.
        baseUrl:
          type: string
          format: service
          default: https://anypoint.mulesoft.com
          description: |
            Anypoint Exchange base URL. Registered as a `format: service`
            Envoy upstream cluster, so it MUST be host-only (no path
            component). Defaults to the control-plane
            (`https://anypoint.mulesoft.com`); override for EU
            (`https://eu1.anypoint.mulesoft.com`) / GovCloud, or point at
            the gateway's own internal listener when using
            `exchangePathPrefix` (loopback mode).
        exchangePathPrefix:
          type: string
          default: ""
          description: |
            Optional path prefix prepended to every Exchange request path
            (e.g. `/exchange-pin`). When set, the policy dispatches the
            pin fetch to `baseUrl` verbatim (no upstream-cluster
            discovery), so `baseUrl` can point at the gateway's own
            internal listener (`http://127.0.0.1:8081`) and the request
            re-enters through a plain passthrough route whose
            `auto_host_rewrite` restores the correct `Host` for
            `anypoint.mulesoft.com`. This works around managed Omni /
            Flex Gateways mangling the egress `Host` on
            policy-originated calls. Leave empty for a direct Exchange
            call.
        exchangeFilePathPrefix:
          type: string
          default: ""
          description: |
            Path prefix for the SECOND loopback hop that fetches the
            descriptor FILE content from the pre-signed storage URL
            (e.g. `/exchange-s3`). Exchange returns asset metadata from
            anypoint.mulesoft.com but serves the file itself from a
            pre-signed S3 URL on a different host; that host enforces the
            signed `Host`, so on a managed gateway the file GET must go
            through its own passthrough route whose auto_host_rewrite
            restores the S3 Host. Both hops share `baseUrl`
            (http://127.0.0.1:8081); this prefix selects the S3 route.
            Leave empty only on a connected gateway that can reach the
            storage host directly.
        authType:
          type: string
          enum:
            - basic
            - oauth2_client_credentials
          default: oauth2_client_credentials
        credSecretRef:
          type: string
          description: |
            Reference to a Flex secrets entry containing the
            credentials. For `basic`: `username` / `password`. For
            client_credentials: `clientId` / `clientSecret`.
        refreshIntervalSec:
          type: integer
          minimum: 30
          maximum: 86400
          default: 300
      required:
        - orgId
        - groupId
        - assetId
        - version
        - credSecretRef

    # ------------------------------------------------------------------
    # Enforcement gates against the canonical descriptor set.
    # ------------------------------------------------------------------
    enforce:
      type: object
      properties:
        exactMatch:
          type: boolean
          default: true
        allowAddedTools:
          type: boolean
          default: false
        allowRemovedTools:
          type: boolean
          default: true

    # ------------------------------------------------------------------
    # Decision mode.
    # ------------------------------------------------------------------
    mode:
      type: string
      enum:
        - enforce
        - observe
        - warn
      default: enforce
      description: |
        - enforce: strip drifted tools from `tools/list` responses.
        - warn: pass through with `x-mcp-drift-warning` header.
        - observe: emit structured evidence only.

    # ------------------------------------------------------------------
    # Failure behavior.
    # ------------------------------------------------------------------
    failOpen:
      type: object
      properties:
        onPinUnavailable:
          type: boolean
          default: false
          description: |
            When false (default) `tools/list` is denied if the
            descriptor set cannot be loaded on bootstrap (no LKG yet).
            After bootstrap LKG is always preferred over hard failure.
  required:
    - exchange
